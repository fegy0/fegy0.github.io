<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>RegistrApp</title>
</head>
<body>
    
    <div class="contenedor" id="descargar">
        <p id="texto">Aplicacion desarrollada como un proyecto semestral que es capaz de llevar un registro de clases de estudiantes, todo esto mediante el escaneo de un codigo QR. Aparte de permitir crear un usuario, cambiar la contraseña y cerrar sesion</p>
        <div class="botonYQR">
            <button id="descargarBoton">Descargar APK</button>
            <div id="codigoQR"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
</body>
</html>
